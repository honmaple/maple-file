syntax = "proto3";

package api.file;

option go_package = "api/file";

service ServerService {
	rpc StartServer (Server.StartRequest) returns (Server.StartResponse) {
	}

	rpc StopServer (Server.StopRequest) returns (Server.StopResponse) {
	}

	rpc ServerStatus (Server.GetRequest) returns (Server.GetResponse) {
	}
}

message Server {
	string addr = 1;
	bool   running = 2;
	string error = 3;

	message GetRequest {
		string type = 1;
	}

	message GetResponse {
		Server result = 1;
	}

	message StartRequest {
		string type = 1;
		string option = 2;
	}

	message StartResponse {
		Server result = 1;
	}

	message StopRequest {
		string type = 1;
	}

	message StopResponse {
	}
}
